name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["main"] # Asegúrate de que esta sea tu rama principal (main o master)
  workflow_dispatch:

# Permisos necesarios para que GitHub Actions pueda desplegar en Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Construir la aplicación Angular
        # El base-href es crucial para que los assets carguen bien en GitHub Pages
        run: npm run build -- --base-href /notas_front_angular/

      - name: Subir artefacto para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # Ruta donde Angular 17+ / 21 guarda los archivos por defecto
          path: './dist/komodo-notas/browser'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
